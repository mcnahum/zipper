name: ZipperApp
options:
  bundleIdPrefix: com.example
  developmentRegion: en
  deploymentTarget:
    macOS: "13.0"
targets:
  ZipperApp:
    type: application
    platform: macOS
    sources:
      - path: Sources
        compilerFlags: -Wall
    settings:
      CODE_SIGN_IDENTITY: "-"
      ENABLE_HARDENED_RUNTIME: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: NO
      INFOPLIST_FILE: Sources/Info.plist
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      PRODUCT_NAME: Zipper
      SWIFT_VERSION: 5.9
    preBuildScripts:
      - script: |
          mkdir -p "$BUILT_PRODUCTS_DIR/$CONTENTS_FOLDER_PATH/Resources"
          DEST="$BUILT_PRODUCTS_DIR/$CONTENTS_FOLDER_PATH/Resources/7zz"
          chmod u+w "$DEST" 2>/dev/null || true
          rm -f "$DEST"
          /usr/bin/install -m 755 "$SRCROOT/Sources/Resources/7zz" "$DEST"

          if [ -n "$DWARF_DSYM_FOLDER_PATH" ]; then
            /usr/bin/xcrun dsymutil "$SRCROOT/Sources/Resources/7zz" -o "$DWARF_DSYM_FOLDER_PATH/7zz.dSYM"
          fi
        name: Copy 7zz
    entitlements:
      path: ZipperApp.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
